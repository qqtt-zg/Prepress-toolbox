<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- PDF文档背景 -->
  <rect x="8" y="10" width="32" height="44" rx="2" fill="#a0a0a0"/>
  <!-- PDF折角 -->
  <polygon points="32,10 40,18 32,18" fill="#828282"/>
  <!-- PDF文字线条 -->
  <rect x="12" y="18" width="18" height="3" rx="1" fill="#646464"/>
  <rect x="12" y="24" width="16" height="3" rx="1" fill="#646464"/>
  <rect x="12" y="30" width="14" height="3" rx="1" fill="#646464"/>
  <rect x="12" y="36" width="12" height="3" rx="1" fill="#646464"/>
  <!-- 分割虚线 -->
  <line x1="10" y1="14" x2="36" y2="14" stroke="#646464" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- 剪刀 -->
  <g fill="none" stroke="#505050" stroke-width="2">
    <!-- 手柄圆 -->
    <circle cx="50" cy="42" r="6"/>
    <circle cx="50" cy="26" r="6"/>
    <!-- 刀刃 -->
    <line x1="50" y1="36" x2="44" y2="50"/>
    <line x1="50" y1="36" x2="56" y2="50"/>
    <!-- 中心轴 -->
    <circle cx="50" cy="36" r="3" fill="#505050" stroke="none"/>
  </g>
</svg>
