<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景渐变：深邃宇宙 -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1a;stop-opacity:1" />
    </radialGradient>

    <!-- 蓝色流星渐变：星云/科技 -->
    <linearGradient id="blueMeteor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a86ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8338ec;stop-opacity:1" />
    </linearGradient>

    <!-- 黄色流星渐变：能量/光芒 -->
    <linearGradient id="goldMeteor" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ffbe0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fb5607;stop-opacity:1" />
    </linearGradient>

    <!-- 发光滤镜 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)" />

  <!-- 主体图形组 -->
  <g transform="translate(256, 256) rotate(-45)">
    
    <!-- 上方板块 (蓝色流星) -->
    <!-- 修改了形状：头部变圆润，尾部变尖锐，模拟流星拖尾 -->
    <path d="M-10, -10 L-140, -10 Q-170, -10, -170, 20 L-170, 90 Q-170, 120, -140, 120 L-10, 120 L-10, -10 Z" 
          fill="url(#blueMeteor)" 
          transform="translate(0, -125)"
          style="filter:url(#glow);" />

    <!-- 下方板块 (金色流星) -->
    <path d="M10, 10 L140, 10 Q170, 10, 170, -20 L170, -90 Q170, -120, 140, -120 L10, -120 L10, 10 Z" 
          fill="url(#goldMeteor)" 
          transform="translate(0, 125)"
          style="filter:url(#glow);" />
          
  </g>

  <!-- 装饰星点 -->
  <!-- 右上角的点睛之星 -->
  <path d="M400, 100 L410, 130 L440, 140 L410, 150 L400, 180 L390, 150 L360, 140 L390, 130 Z" 
        fill="#ffffff" 
        opacity="0.9"
        transform="scale(0.6) translate(200, 50)"
        style="filter:url(#glow);">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="3s" repeatCount="indefinite" />
  </path>

</svg>