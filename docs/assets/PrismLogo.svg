<svg width="512" height="512" viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 1. 青色到蓝色的渐变 (左上) -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:1" /> <!-- 亮青 -->
      <stop offset="100%" style="stop-color:#007AFF;stop-opacity:1" /> <!-- 科技蓝 -->
    </linearGradient>

    <!-- 2. 洋红到紫色的渐变 (右上) -->
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF2D55;stop-opacity:1" /> <!-- 热粉 -->
      <stop offset="100%" style="stop-color:#AF52DE;stop-opacity:1" /> <!-- 紫色 -->
    </linearGradient>

    <!-- 3. 黄色到橙色的渐变 (下方) -->
    <linearGradient id="grad3" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#FFCC00;stop-opacity:1" /> <!-- 暖黄 -->
      <stop offset="100%" style="stop-color:#FF9500;stop-opacity:1" /> <!-- 橙色 -->
    </linearGradient>

    <!-- 滤镜：轻微的模糊让重叠更融合 (可选) -->
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 背景 (开发预览用，实际使用可删除) -->
  <!-- <rect width="100%" height="100%" fill="white"/> -->

  <g transform="translate(100, 100)">
    <!-- 这里的混合模式(multiply)是关键，模拟印刷叠加产生黑色的效果 -->
    <!-- 注意：如果在WinForms AntdUI中不支持mix-blend-mode，SVG显示为普通透明叠加 -->
    <g style="mix-blend-mode: multiply;">
      
      <!-- 1. 左侧三角形 (青蓝) - 旋转 -30度 -->
      <!-- 形状是一个等腰三角形，指向中心 -->
      <path d="M0,-15 L-55,80 L55,80 Z" fill="url(#grad1)" opacity="0.85" transform="rotate(0) translate(0, -55)" />

      <!-- 2. 右侧三角形 (红紫) - 旋转 120度 -->
      <path d="M0,-15 L-55,80 L55,80 Z" fill="url(#grad2)" opacity="0.85" transform="rotate(120) translate(0, -55)" />

      <!-- 3. 下方三角形 (黄橙) - 旋转 240度 -->
      <path d="M0,-15 L-55,80 L55,80 Z" fill="url(#grad3)" opacity="0.85" transform="rotate(240) translate(0, -55)" />
      
    </g>
  </g>
  
  <!-- 可选：添加文字 Prism -->
  <!-- <text x="100" y="170" font-family="Arial, sans-serif" font-weight="bold" font-size="24" text-anchor="middle" fill="#333" letter-spacing="2">PRISM</text> -->
  
</svg>