<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 通用渐变 -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0072FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7971E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD200;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f54ea2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff7676;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="800" fill="#1a1a1a" />

  <!-- 1. 流星 S (左上) -->
  <g transform="translate(50, 50)">
    <text x="100" y="30" fill="#fff" font-family="Arial" font-size="20">1. 流星 S (Meteor S)</text>
    <g transform="translate(150, 180) scale(1.2)">
      <!-- 上半部分 S -->
      <path d="M0,0 C-50,-50 -100,0 -50,50 L20,100 L50,80 L-20,30 C-40,10 -20,-20 0,0 Z" 
            fill="url(#blueGrad)" transform="translate(-20, -20)" />
      <!-- 星芒装饰 -->
      <path d="M60,-20 L70,10 L40,0 L50,-30 Z" fill="#fff" />
      
      <!-- 下半部分 S -->
      <path d="M0,0 C50,50 100,0 50,-50 L-20,-100 L-50,-80 L20,-30 C40,-10 20,20 0,0 Z" 
            fill="url(#goldGrad)" transform="translate(20, 80)" />
    </g>
  </g>

  <!-- 2. 星系汇聚 (右上) -->
  <g transform="translate(450, 50)">
    <text x="100" y="30" fill="#fff" font-family="Arial" font-size="20">2. 星系汇聚 (Galaxy)</text>
    <g transform="translate(150, 150)">
      <!-- 螺旋点阵 -->
      <circle cx="0" cy="-60" r="15" fill="url(#blueGrad)" opacity="0.4" />
      <circle cx="40" cy="-40" r="20" fill="url(#blueGrad)" opacity="0.6" />
      <circle cx="60" cy="0" r="25" fill="url(#blueGrad)" opacity="0.8" />
      
      <circle cx="0" cy="60" r="15" fill="url(#goldGrad)" opacity="0.4" />
      <circle cx="-40" cy="40" r="20" fill="url(#goldGrad)" opacity="0.6" />
      <circle cx="-60" cy="0" r="25" fill="url(#goldGrad)" opacity="0.8" />
      
      <!-- 中心核心 -->
      <circle cx="0" cy="0" r="35" fill="#fff" />
    </g>
  </g>

  <!-- 3. 星之箭 (左下) -->
  <g transform="translate(50, 450)">
    <text x="100" y="30" fill="#fff" font-family="Arial" font-size="20">3. 星之箭 (Star Arrow)</text>
    <g transform="translate(150, 150) rotate(-15)">
      <!-- 速度线 -->
      <rect x="-100" y="-30" width="120" height="15" rx="7" fill="url(#blueGrad)" opacity="0.5" />
      <rect x="-120" y="0" width="140" height="15" rx="7" fill="url(#blueGrad)" opacity="0.7" />
      <rect x="-100" y="30" width="120" height="15" rx="7" fill="url(#blueGrad)" opacity="0.5" />
      
      <!-- 星头 -->
      <path d="M40,0 L0,-40 L20,0 L0,40 Z" fill="url(#goldGrad)" transform="translate(20,0) scale(1.5)" />
      <!-- 箭头主体 -->
      <path d="M20,-40 L80,0 L20,40 L40,0 Z" fill="url(#goldGrad)" transform="translate(20,0) scale(1.5)" />
    </g>
  </g>

  <!-- 4. 解构五角星 (右下) -->
  <g transform="translate(450, 450)">
    <text x="100" y="30" fill="#fff" font-family="Arial" font-size="20">4. 解构五角星 (Woven)</text>
    <g transform="translate(150, 160) scale(0.8)">
      <!-- 使用简单的线条编织感 -->
      <!-- V形 -->
      <path d="M-80,-50 L0,80 L80,-50 L50,-50 L0,30 L-50,-50 Z" fill="url(#blueGrad)" />
      <!-- 倒V形穿插 -->
      <path d="M-80,40 L0,-90 L80,40 L50,40 L0,-40 L-50,40 Z" fill="url(#purpleGrad)" style="mix-blend-mode: screen;" />
      
      <!-- 装饰点 -->
      <circle cx="0" cy="0" r="15" fill="#fff" />
    </g>
  </g>

</svg>